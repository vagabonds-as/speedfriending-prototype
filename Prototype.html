// Helper: tab-mapping

  if (phoneType === 'events') return 'events';
  if (phoneType === 'crew')   return 'crew';
  if (phoneType === 'chat')   return 'chat';
  if (phoneType === 'you')    return 'you';
  return undefined; // app (uten tab-bar) eller web
}

// ═════════════════════════════════════════════════════════════════
// KOMPONENT: Storyline-spiller
// ═════════════════════════════════════════════════════════════════

function StorylinePlayer({ storyline, onExit }) {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const timerRef = useRef(null);

  const current = storyline.steps[step];
  const total = storyline.steps.length;
  const progress = ((step + 1) / total) * 100;

  useEffect(() => {
    if (playing) {
      timerRef.current = setTimeout(() => {
        if (step < total - 1) {
          setStep(s => s + 1);
        } else {
          setPlaying(false);
        }
      }, 5000);
    }
    return () => clearTimeout(timerRef.current);
  }, [playing, step, total]);

  const next = () => { setPlaying(false); if (step < total - 1) setStep(s => s + 1); };
  const prev = () => { setPlaying(false); if (step > 0) setStep(s => s - 1); };

  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(160deg, #1A0F22 0%, #0F0812 100%)', color:'#fff', padding:'32px 20px 60px'}}>

      {/* Top bar */}
      <div style={{maxWidth:1200, margin:'0 auto 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <button onClick={onExit} style={{padding:'8px 14px', borderRadius:18, border:'1px solid rgba(255,255,255,.15)', background:'rgba(255,255,255,.05)', color:'#fff', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit'}}>
          ← Alle storylines
        </button>
        <div style={{fontSize:11, color:'rgba(255,255,255,.4)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.14em'}}>
          Storyline · Skjerm {step+1} av {total}
        </div>
      </div>

      {/* Storyline-header med persona og progresjon */}
      <div style={{maxWidth:1200, margin:'0 auto 24px'}}>
        <div style={{fontFamily:'Fraunces, serif', fontSize:30, fontWeight:700, letterSpacing:'-0.02em', color:'#fff', marginBottom:6}}>
          {storyline.label}
        </div>
        <div style={{fontSize:13, color:storyline.color, fontWeight:600, marginBottom:16}}>
          {storyline.persona}
        </div>

        {/* Progresjonsbar */}
        <div style={{height:3, borderRadius:2, background:'rgba(255,255,255,.08)', overflow:'hidden', marginBottom:12}}>
          <div style={{height:'100%', width:`${progress}%`, background:`linear-gradient(90deg, ${storyline.color}, #F0826B)`, borderRadius:2, transition:'width .4s'}}/>
        </div>

        {/* Skjerm-prikker */}
        <div style={{display:'flex', gap:4, marginBottom:16}}>
          {storyline.steps.map((_, i) => (
            <button key={i} onClick={()=>{setStep(i); setPlaying(false);}} style={{
              flex:1, height:4, borderRadius:2, border:'none', padding:0, cursor:'pointer',
              background: i <= step ? storyline.color : 'rgba(255,255,255,.12)',
              transition:'background .2s',
            }}/>
          ))}
        </div>
      </div>

      {/* Kontekst-tekst */}
      <div style={{maxWidth:720, margin:'0 auto 20px', textAlign:'center'}}>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:'.18em', textTransform:'uppercase', color:storyline.color, marginBottom:8}}>
          {current.title}
        </div>
        <div style={{fontFamily:'Fraunces, serif', fontSize:18, fontWeight:400, fontStyle:'italic', lineHeight:1.5, color:'rgba(255,255,255,.82)'}}>
          "{current.context}"
        </div>
      </div>

      {/* Telefonramme */}
      <div style={{display:'flex', justifyContent:'center', marginBottom:24}}>
        <H_Phone activeTab={phoneTabFor(current.phone)}>
          {current.screen()}
        </H_Phone>
      </div>

      {/* Play-kontroller */}
      <div style={{display:'flex', justifyContent:'center', gap:10, marginBottom:30}}>
        <button onClick={prev} disabled={step===0} style={{
          width:48, height:48, borderRadius:24, border:'1px solid rgba(255,255,255,.15)',
          background:'rgba(255,255,255,.05)', color:'#fff', cursor: step===0 ? 'default' : 'pointer',
          opacity: step===0 ? .3 : 1, display:'inline-flex', alignItems:'center', justifyContent:'center',
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M10 2L4 8l6 6" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button onClick={()=>setPlaying(p=>!p)} style={{
          height:48, padding:'0 22px', borderRadius:24, border:'none',
          background: playing ? '#F0826B' : 'linear-gradient(100deg, #F0826B, #7F4D95)',
          color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
          display:'inline-flex', alignItems:'center', gap:8,
          boxShadow:'0 8px 20px rgba(240,130,107,.35)',
        }}>
          {playing ? (
            <><span style={{width:8, height:8, background:'#fff', animation:'pulseDot 1s ease-in-out infinite'}}/> Spiller</>
          ) : (
            <><svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 1v10l9-5z" fill="#fff"/></svg> Spill av</>
          )}
        </button>
        <button onClick={next} disabled={step===total-1} style={{
          width:48, height:48, borderRadius:24, border:'1px solid rgba(255,255,255,.15)',
          background:'rgba(255,255,255,.05)', color:'#fff', cursor: step===total-1 ? 'default' : 'pointer',
          opacity: step===total-1 ? .3 : 1, display:'inline-flex', alignItems:'center', justifyContent:'center',
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M6 2l6 6-6 6" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>

      <div style={{textAlign:'center', fontSize:11, color:'rgba(255,255,255,.35)'}}>
        Auto-advance hver 5 sek når "Spill av" er aktiv · Klikk prikker over for å hoppe
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
// KOMPONENT: Flow-utforsker (eksisterende atferd)
// ═════════════════════════════════════════════════════════════════

function FlowExplorer({ onExit }) {
  const [flowKey, setFlowKey] = useState('social');
  const [screenKey, setScreenKey] = useState(FLOWS.social.start);
  const [history, setHistory] = useState([]);

  const flow = FLOWS[flowKey];
  const screen = flow.screens[screenKey];

  const goTo = (newKey) => { setHistory(h => [...h, screenKey]); setScreenKey(newKey); };
  const goBack = () => { if (history.length === 0) return; const last = history[history.length - 1]; setHistory(h => h.slice(0, -1)); setScreenKey(last); };
  const switchFlow = (key) => { setFlowKey(key); setScreenKey(FLOWS[key].start); setHistory([]); };

  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(160deg, #1A0F22 0%, #0F0812 100%)', color:'#fff', padding:'32px 20px 60px'}}>
      <div style={{maxWidth:1200, margin:'0 auto 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <button onClick={onExit} style={{padding:'8px 14px', borderRadius:18, border:'1px solid rgba(255,255,255,.15)', background:'rgba(255,255,255,.05)', color:'#fff', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit'}}>← Tilbake til meny</button>
        <div style={{fontSize:11, color:'rgba(255,255,255,.4)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.14em'}}>Quick Flow · Utforsk fritt</div>
      </div>

      {/* Flow-selector */}
      <div style={{maxWidth:1200, margin:'0 auto 28px'}}>
        <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
          {Object.entries(FLOWS).map(([key, f]) => (
            <button key={key} onClick={()=>switchFlow(key)} style={{
              padding:'10px 14px', borderRadius:12,
              border: flowKey===key ? '1.5px solid #F0826B' : '1px solid rgba(255,255,255,.15)',
              background: flowKey===key ? 'rgba(240,130,107,.15)' : 'rgba(255,255,255,.03)',
              color: flowKey===key ? '#fff' : 'rgba(255,255,255,.7)',
              fontSize:12.5, fontWeight: flowKey===key ? 700 : 500, cursor:'pointer', fontFamily:'inherit',
            }}>{f.label}</button>
          ))}
        </div>
      </div>

      {/* Flow-info */}
      <div style={{maxWidth:1200, margin:'0 auto 24px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div style={{fontFamily:'Fraunces, serif', fontSize:22, color:'#fff', fontWeight:600}}>{flow.label}</div>
        {history.length > 0 && (
          <button onClick={goBack} style={{padding:'10px 16px', borderRadius:22, border:'1px solid rgba(255,255,255,.2)', background:'rgba(255,255,255,.05)', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit'}}>← Tilbake</button>
        )}
      </div>

      {/* Telefonramme */}
      <div style={{display:'flex', justifyContent:'center', marginBottom:24}}>
        <H_Phone activeTab={phoneTabFor(screen.phone)}>
          {screen.render()}
        </H_Phone>
      </div>

      {/* Neste-skjermer */}
      {screen.next && screen.next.length > 0 && (
        <div style={{maxWidth:900, margin:'0 auto'}}>
          <div style={{fontSize:10.5, fontWeight:700, letterSpacing:'.18em', textTransform:'uppercase', color:'rgba(255,255,255,.4)', marginBottom:12, textAlign:'center'}}>Klikk for å gå videre</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center'}}>
            {screen.next.map(([targetKey, label]) => (
              <button key={targetKey} onClick={()=>goTo(targetKey)} style={{
                padding:'14px 22px', borderRadius:26, border:'none',
                background:'linear-gradient(100deg, #F0826B, #7F4D95)',
                color:'#fff', fontSize:13.5, fontWeight:700, cursor:'pointer',
                boxShadow:'0 8px 20px rgba(240,130,107,.35)', fontFamily:'inherit',
              }}>{label} →</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
// KOMPONENT: Hovedmeny (storylines + flows)

function Menu({ onSelectStoryline, onOpenFlows }) {
  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(160deg, #1A0F22 0%, #0F0812 100%)', color:'#fff', padding:'48px 20px 60px'}}>

      {/* Masthead */}
      <div style={{maxWidth:1200, margin:'0 auto 36px', paddingBottom:28, borderBottom:'1px solid rgba(255,255,255,.1)'}}>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:'.22em', textTransform:'uppercase', color:'#B788C9', marginBottom:8}}>Klikkbar prototype v2 · Storylines</div>
        <div style={{fontFamily:'Fraunces, serif', fontSize:48, fontWeight:700, letterSpacing:'-0.025em', color:'#fff', lineHeight:1}}>Speedfriending.</div>
        <div style={{fontSize:15, color:'rgba(255,255,255,.55)', marginTop:12, maxWidth:720, lineHeight:1.55}}>
          Velg en <em>storyline</em> for å følge en ekte produktreise fra start til slutt — med kontekst, persona og auto-play. Eller utforsk skjermene fritt under "Quick Flows".
        </div>
      </div>

      {/* Storylines */}
      <div style={{maxWidth:1200, margin:'0 auto 48px'}}>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:'.2em', textTransform:'uppercase', color:'#F0826B', marginBottom:20}}>6 Storylines · tverr-reiser</div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:14}}>
          {Object.entries(STORYLINES).map(([key, s]) => (
            <button key={key} onClick={()=>onSelectStoryline(key)} style={{
              textAlign:'left', padding:'22px 22px 20px', borderRadius:18,
              border:'1px solid rgba(255,255,255,.1)',
              background:'rgba(255,255,255,.03)',
              cursor:'pointer', fontFamily:'inherit', color:'#fff',
              transition:'all .2s',
              position:'relative', overflow:'hidden',
            }}
            onMouseEnter={e => {e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.background = 'rgba(255,255,255,.07)';}}
            onMouseLeave={e => {e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.background = 'rgba(255,255,255,.03)';}}
            >
              <div style={{position:'absolute', top:0, left:0, right:0, height:3, background:s.color}}/>
              <div style={{fontSize:10, fontWeight:700, letterSpacing:'.16em', textTransform:'uppercase', color:s.color, marginBottom:10}}>
                {s.steps.length} skjermer
              </div>
              <div style={{fontFamily:'Fraunces, serif', fontSize:22, fontWeight:600, letterSpacing:'-0.01em', color:'#fff', marginBottom:6}}>
                {s.label}
              </div>
              <div style={{fontSize:12, color:'rgba(255,255,255,.55)', marginBottom:12, fontStyle:'italic'}}>
                {s.persona}
              </div>
              <div style={{fontSize:13, color:'rgba(255,255,255,.75)', lineHeight:1.5}}>
                {s.description}
              </div>
              <div style={{marginTop:16, fontSize:12, color:s.color, fontWeight:600, display:'inline-flex', alignItems:'center', gap:6}}>
                Start reisen →
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Quick flows */}
      <div style={{maxWidth:1200, margin:'0 auto 36px'}}>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:'.2em', textTransform:'uppercase', color:'#B788C9', marginBottom:20}}>Quick Flows · fri utforsking</div>
        <button onClick={onOpenFlows} style={{
          padding:'20px 26px', borderRadius:18,
          border:'1px solid rgba(255,255,255,.12)',
          background:'rgba(255,255,255,.05)',
          cursor:'pointer', fontFamily:'inherit', color:'#fff',
          display:'flex', alignItems:'center', gap:18, width:'100%',
          textAlign:'left',
        }}>
          <div style={{fontSize:32}}>🗂</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Fraunces, serif', fontSize:20, fontWeight:600, color:'#fff', marginBottom:4}}>
              Utforsk 100+ skjermer fritt
            </div>
            <div style={{fontSize:13, color:'rgba(255,255,255,.55)'}}>
              10 flows · Social, Business, Dating, B2B, Sponsor, Ambassadør, Avanserte features, Wrapped, Nettside — klikk deg gjennom i din egen rekkefølge.
            </div>
          </div>
          <div style={{fontSize:14, color:'#B788C9', fontWeight:600}}>→</div>
        </button>
      </div>

      {/* Footer med lenker */}
      <div style={{maxWidth:1200, margin:'0 auto', paddingTop:28, borderTop:'1px solid rgba(255,255,255,.08)', display:'flex', flexWrap:'wrap', justifyContent:'space-between', gap:14, fontSize:12, color:'rgba(255,255,255,.4)'}}>
        <div>Speedfriending · 100+ skjermer · bygget i Claude Code · april 2026</div>
        <div style={{display:'flex', gap:20}}>
          <a href="Hjem.html" style={{color:'rgba(255,255,255,.55)'}}>Galleri med alle skjermer</a>
          <span>·</span>
          <a href="../../FEEDBACK.md" style={{color:'rgba(255,255,255,.55)'}}>FEEDBACK.md</a>
          <span>·</span>
          <a href="../../APP_MAP.md" style={{color:'rgba(255,255,255,.55)'}}>APP_MAP.md</a>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
// APP — ruter mellom menyen, storylines, og flows
// ═════════════════════════════════════════════════════════════════

function App() {
  const [mode, setMode] = useState('menu'); // 'menu' | 'storyline' | 'flow'
  const [storylineKey, setStorylineKey] = useState(null);

  if (mode === 'menu') {
    return <Menu
      onSelectStoryline={(key) => { setStorylineKey(key); setMode('storyline'); }}
      onOpenFlows={() => setMode('flow')}
    />;
  }

  if (mode === 'storyline' && storylineKey) {
    return <StorylinePlayer
      storyline={STORYLINES[storylineKey]}
      onExit={() => setMode('menu')}
    />;
  }

  if (mode === 'flow') {
    return <FlowExplorer onExit={() => setMode('menu')}/>;
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
